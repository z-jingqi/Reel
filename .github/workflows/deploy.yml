name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.web == 'true' }}
      server: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.server == 'true' }}
      migrate: ${{ github.event_name == 'workflow_dispatch' || steps.filter.outputs.migrate == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - if: github.event_name != 'workflow_dispatch'
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
            server:
              - 'apps/server/**'
              - 'packages/**'
            migrate:
              - 'packages/database/migrations/**'

  migrate-db:
    needs: changes
    if: needs.changes.outputs.migrate == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm --filter @reel/server run db:migrate:remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_GIT_ACTION }}

  deploy-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm --filter @reel/web run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_GIT_ACTION }}

  deploy-server:
    needs: [changes, migrate-db]
    if: ${{ always() && needs.changes.outputs.server == 'true' && needs.migrate-db.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm --filter @reel/server run deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_GIT_ACTION }}
